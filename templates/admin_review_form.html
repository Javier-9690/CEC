{% extends "base.html" %}
{% block title %}Nueva reseña · {{ site_name }}{% endblock %}
{% block content %}
<section class="form-panel parchment-panel">
  <p class="eyebrow">Reseña</p>
  <h1>Publicar reseña</h1>
  <form method="post" class="stack-form">
    <label>Título
      <input type="text" name="title" required placeholder="Título de la reseña">
    </label>
    <div class="form-grid-2">
      <label>Autor o responsable
        <input type="text" name="author" placeholder="Nombre del autor">
      </label>
      <label>Tema existente
        <select name="topic_id">
          <option value="">Usar tema General</option>
          {% for topic in topics %}
            <option value="{{ topic.id }}">{{ topic.title }}</option>
          {% endfor %}
        </select>
      </label>
    </div>

    <details class="inline-help">
      <summary>Crear un nuevo tema para esta reseña</summary>
      <label>Nombre del nuevo tema
        <input type="text" name="new_topic_title" placeholder="Ej: Patrística eucarística">
      </label>
      <label>Descripción del nuevo tema
        <textarea name="new_topic_description" rows="3" placeholder="Breve explicación de la unidad temática"></textarea>
      </label>
    </details>

    <label>Valoración opcional
      <select name="rating">
        <option value="">Sin valoración</option>
        <option value="5">5 estrellas</option>
        <option value="4">4 estrellas</option>
        <option value="3">3 estrellas</option>
        <option value="2">2 estrellas</option>
        <option value="1">1 estrella</option>
      </select>
    </label>
    <label>Contenido
      <textarea name="body" rows="10" required placeholder="Escribe la reseña"></textarea>
    </label>
    <button class="btn primary" type="submit">Publicar reseña</button>
  </form>
</section>
{% endblock %}
