{% extends "base.html" %}
{% block title %}Visor · {{ material.title }}{% endblock %}
{% block head %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
{% endblock %}
{% block content %}
<section class="page-title parchment-panel compact">
  <p class="eyebrow">Visor interactivo</p>
  <h1>{{ material.title }}</h1>
</section>

<section class="interactive-viewer parchment-panel protected-content" data-pdf-url="{{ url_for('material_file', material_id=material.id) }}" data-watermark="{{ site_name }}" oncontextmenu="return false">
  <div class="pdf-toolbar">
    <button id="prevPage" class="btn small secondary">Anterior</button>
    <span class="pdf-status">Página <strong id="pageNum">1</strong> / <strong id="pageCount">?</strong></span>
    <button id="nextPage" class="btn small secondary">Siguiente</button>
    <button id="zoomOut" class="btn small secondary">−</button>
    <button id="zoomIn" class="btn small secondary">+</button>
    <button id="fullscreen" class="btn small primary">Pantalla completa</button>
  </div>
  <div class="canvas-wrap watermark-zone">
    <div class="watermark-layer" aria-hidden="true">{{ site_name }}</div>
    <canvas id="pdfCanvas"></canvas>
  </div>
  <noscript>
    <p>Activa JavaScript para usar el visor interactivo.</p>
  </noscript>
</section>
<script src="{{ url_for('static', filename='js/pdf_viewer.js') }}"></script>
{% endblock %}
